name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Quality gate (typecheck · lint · build · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install (reproducible, from lockfile)
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Schema drift (migrations match Drizzle schema)
        # Offline: `db:generate` does not connect (drizzle.config only connects
        # for migrate/check). A dummy DATABASE_URL satisfies config parsing.
        # Fails if regenerating produces any change under migrations/ — i.e. the
        # committed migration has drifted from the schema and must be regenerated.
        env:
          DATABASE_URL: postgres://drift:drift@localhost:5432/drift
        run: |
          npm run db:generate
          if [ -n "$(git status --porcelain -- src/infrastructure/database/migrations)" ]; then
            echo "::error::Drizzle schema and migrations are out of sync. Run 'npm run db:generate' and commit the result."
            git status --porcelain -- src/infrastructure/database/migrations
            git --no-pager diff -- src/infrastructure/database/migrations
            exit 1
          fi
  docker:
    name: Docker image build (optional)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (no push)
        run: docker build -t svoya-igra-backend:ci .
