# GitLab CI — Build Your Project Presentation backend.
#
# Foundation pipeline only: install -> typecheck -> lint -> test -> build, plus
# an OPTIONAL, manual Docker image-build check. It runs the same npm scripts used
# locally, so "green here" means "green on a developer machine".
#
# Out of scope (deferred): deployment, registry push, environment promotion, and
# integration tests against live PostgreSQL/MinIO. Default tests are unit-level
# and mocked. See docs/ci.md.

default:
  image: node:22-alpine

stages:
  - install
  - typecheck
  - lint
  - test
  - build
  - docker

variables:
  # Keep npm's download cache inside the project dir so GitLab can cache it.
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

# Reproducible install from the lockfile (fails if package.json and
# package-lock.json disagree). node_modules is shared with later jobs as a
# short-lived artifact; the npm download cache is reused across pipelines.
install:
  stage: install
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --prefer-offline --no-audit --no-fund
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

typecheck:
  stage: typecheck
  dependencies:
    - install
  script:
    - npm run typecheck

lint:
  stage: lint
  dependencies:
    - install
  # Uses the repo's lint script (eslint --max-warnings 0). No auto-fix in CI.
  script:
    - npm run lint

test:
  stage: test
  dependencies:
    - install
  # Default tests are mocked — no live PostgreSQL/MinIO/WebSocket/browser needed.
  script:
    - npm test

build:
  stage: build
  dependencies:
    - install
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# Optional: confirm the backend image still builds from the Dockerfile.
# Manual + allow_failure so the pipeline is green even on runners without
# Docker-in-Docker. It NEVER pushes the image anywhere.
docker-build:
  stage: docker
  image: docker:27-cli
  services:
    - docker:27-dind
  needs: []
  when: manual
  allow_failure: true
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  script:
    - docker build -t svoya-igra-backend:ci .
